<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ААВ БОЛ САЯТАН - Очирпүрэв</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p-blue: #EFF6FF; --d-blue: #1D4ED8; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--p-blue); color: #333; user-select: none; }
        .fancy-font { font-family: 'Pacifico', cursive; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .prize-active { background-color: var(--d-blue) !important; color: white !important; transform: scale(1.05); box-shadow: 0 4px 15px rgba(29, 78, 216, 0.4); }
        .threshold { border-left: 6px solid var(--d-blue); font-weight: 800; color: #111; }
        .option-btn { transition: all 0.2s; border: 2px solid #f3f4f6; text-align: left; padding: 1rem; border-radius: 1rem; font-weight: 600; width: 100%; }
        .option-btn:hover:not(:disabled) { border-color: var(--d-blue); background-color: #eff6ff; }
        #certificate-card { background: white; background-image: radial-gradient(#bfdbfe 1.5px, transparent 1.5px); background-size: 20px 20px; }
        /* Шагнал их болсон үед scrollbar нуух */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-4">

    <div id="start-screen" class="max-w-md w-full bg-white/95 backdrop-blur-md p-8 md:p-10 rounded-[2.5rem] shadow-2xl text-center fade-in">
        <h1 class="fancy-font text-5xl text-blue-600 mb-2"> Аав Бол Саятан</h1>
        <p class="text-gray-500 mb-8 font-semibold italic text-sm">ААВД ЗОРИУЛАН ХҮНДРҮҮЛЭВ</p>
        
        <div class="space-y-4 text-left">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2">Таны нэр</label>
                <input type="text" id="player-name" placeholder="Нэрээ бичээрэй..." class="w-full p-4 rounded-2xl border-2 border-blue-50 mt-1 outline-none focus:border-blue-500 transition text-lg">
            </div>
            <button onclick="initGame()" id="start-button" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold text-xl hover:bg-blue-700 shadow-xl transition transform active:scale-95 mt-4 uppercase tracking-widest">Тоглоомыг эхлэх</button>
        </div>
        <p class="mt-6 text-[9px] text-gray-400 font-bold uppercase text-center">бүгдийг нь хариулж чаддаг болчихвол хүүдээ хэлээд асуултаа солиулаарай аав</p>
    </div>

    <div id="game-screen" class="hidden max-w-6xl w-full flex flex-col md:flex-row gap-4 md:gap-6 fade-in">
        <div class="w-full md:w-80 bg-white/90 p-6 rounded-3xl shadow-xl order-2 md:order-1 flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-blue-100 pb-2">
                <h3 class="font-bold text-blue-600 uppercase text-xs">Шагналууд:</h3>
            </div>
            <div id="prize-ladder" class="flex flex-col gap-1 overflow-y-auto max-h-[450px] scrollbar-hide pr-1"></div>
        </div>

        <div class="flex-1 bg-white p-6 md:p-10 rounded-[2.5rem] shadow-2xl order-1 md:order-2 flex flex-col relative min-h-[550px]">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-50 px-4 py-2 rounded-2xl flex items-center gap-2 border border-blue-100 shadow-sm">
                        <span class="text-xl">🛡️</span>
                        <span id="life-count" class="font-bold text-blue-600 text-xl">1</span>
                    </div>
                </div>
                <div class="text-center">
                    <div id="game-timer" class="text-4xl font-black text-blue-600 tabular-nums">30</div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-5050" onclick="use5050()" class="w-12 h-12 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center text-xl hover:bg-blue-100 shadow-sm">⚖</button>
                    <button id="btn-ask" onclick="useAsk()" class="w-12 h-12 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center text-xl hover:bg-blue-100 shadow-sm">📞</button>
                </div>
            </div>
            <div class="flex-1 flex flex-col justify-center text-center">
                <div id="q-step-label" class="inline-block px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 self-center">Асуулт</div>
                <h2 id="q-text" class="text-xl md:text-2xl font-bold text-gray-800 mb-10 leading-snug min-h-[4rem]">...</h2>
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden max-w-2xl w-full fade-in">
        <div id="certificate-card" class="p-8 md:p-14 rounded-[3rem] border-8 border-double border-blue-200 shadow-2xl relative text-center">
            <div class="fancy-font text-4xl text-blue-600 mb-1">Аав бол Саятан</div>
            <p class="text-gray-400 uppercase tracking-[0.4em] text-[10px] font-bold mb-8">Ялагчийн Батламж</p>
            <h1 id="result-title" class="text-2xl font-black text-gray-800 mb-4 tracking-tighter uppercase">Баяр хүргэе!</h1>
            <p class="text-gray-600 mb-8">ХҮНДЭД <span id="final-name" class="font-bold text-blue-600 underline">...</span> та дараах эрхүүдийг хожлоо:</p>
            <div id="won-prizes-list" class="grid grid-cols-1 md:grid-cols-2 gap-2 text-left bg-blue-50/40 p-6 rounded-3xl border border-blue-100 mb-8 max-h-[300px] overflow-y-auto scrollbar-hide"></div>
            <div class="flex justify-between items-end mt-12">
                <div class="text-left text-[9px] text-gray-400 font-bold uppercase leading-relaxed">
                    <p id="final-date">Огноо: --</p>
                </div>
                <div class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-[10px] shadow-lg border-2 border-white uppercase">ЭЭЖИД ХАРУУЛЖ БАТЛУУЛААД ЭРХЭЭ АВ КК</div>
            </div>
        </div>
        <div class="mt-10 text-center">
            <button onclick="location.reload()" class="bg-blue-600 text-white px-12 py-4 rounded-full font-bold shadow-xl">Дахин тоглох</button>
        </div>
    </div>

    <script>
        // Тусгай эхлэлийн асуултууд 
        const starterQuestions = [
            { id: 's1', q: "Маргадын орд нас?", a: ["жинлүүр", "охин", "загас", "матар"] },
            { id: 's2', q: "Маргад хэдэн онд арван жилээ төгссөн бэ?", a: ["2020", "2021", "2019"] },
            { id: 's3', q: "За бэлэн үү аав?", a: ["бэлэн2", "бэлэн биш", "Бэлэнэвтэр", "удахгүй бэлэн болноо,тэ ганаа"] }
        ];

        let generalQuestions = [];

        // 20 шатлалтай шагнал
        const prizeLadder = [
            { lv: 1, text: "утас оролдох эрх", t: false }, 
            { lv: 2, text: "чихэртэй цай найруулуулах эрх", t: false },
            { lv: 3, text: "ганц удаа кола уух эрх ", t: false }, 
            { lv: 4, text: "тамхиа асаалгуулах эрх", t: false },
            { lv: 5, text: "тамхиа авхуулах эрх", t: true }, 
            { lv: 6, text: " Ажлаас тосуулах эрх", t: false },
            { lv: 7, text: "үзэх киногоо сонгох эрх", t: false }, 
            { lv: 8, text: "зурагтыг 1 өдөр эзэмших эрх", t: false },
            { lv: 9, text: "амрах эрх", t: false }, 
            { lv: 10, text: " Хоол хийлгэх эрх", t: true },
            { lv: 11, text: "гахай тэжээх эрх", t: false },
            { lv: 12, text: "нохотой болох эрх", t: false },
            { lv: 13, text: "чингүүнийг хүссэн үедээ бүжиглүүлэх эрх", t: false },
            { lv: 14, text: "ээжийн үглэлтийг зогсоох эрх", t: false },
            { lv: 15, text: "ажилдаа хүргүүлэх эрх", t: true },
            { lv: 16, text: "ээжийг 1 өдөр бүтэн морин жолооч хийлгэх эрх", t: false },
            { lv: 17, text: "хүссэн үедээ ээжийн зураг даралт эсвэл загварын шоуг зогсоох эрх", t: false },
            { lv: 18, text: "ээж чингүүн 2т утасны хориг тавих эрх", t: false },
            { lv: 19, text: "оройн хоолыг шийдэх эрх", t: false },
            { lv: 20, text: "фермтэй болох эрх", t: true }
        ];

        let state = { name: "", step: 0, lives: 1, safePoint: 0, timer: 30, interval: null, pool: [], currentQ: null };

        function getStarterIndex() {
            let idx = parseInt(localStorage.getItem('mn_starter_idx') || "0");
            localStorage.setItem('mn_starter_idx', (idx + 1) % 3);
            return idx;
        }

        function getGlobalUsed() { return JSON.parse(localStorage.getItem('mn_used_ids_final') || '[]'); }
        function saveGlobalUsed(id) {
            let used = getGlobalUsed();
            if(!used.includes(id)) { used.push(id); localStorage.setItem('mn_used_ids_final', JSON.stringify(used)); }
        }

        async function loadQuestionsFromJSON() {
            try {
                const response = await fetch('generalQuestions.json');
                if (!response.ok) throw new Error('JSON файл олдсонгүй');
                return await response.json();
            } catch (error) {
                console.error('Алдаа:', error);
                return [
                    { id: 101, q: "Алдаа: generalQuestions.json файлыг уншиж чадсангүй", a: ["Ойлголоо", "Дахин оролдох", "Засах", "Хаах"] }
                ];
            }
        }

        async function initGame() {
            const name = document.getElementById('player-name').value.trim();
            if(!name) return alert("Нэрээ оруулна уу!");

            const btn = document.getElementById('start-button');
            btn.disabled = true;
            btn.innerText = "Уншиж байна...";

            generalQuestions = await loadQuestionsFromJSON();
            
            state.name = name; state.step = 0; state.lives = 1; state.safePoint = 0;
            
            let usedGlobally = getGlobalUsed();
            state.pool = generalQuestions.filter(q => !usedGlobally.includes(q.id));
            
            // 20 асуулттай тул pool-д хамгийн багадаа 20 асуулт байхыг шалгана
            if(state.pool.length < 20) { 
                localStorage.setItem('mn_used_ids_final', JSON.stringify([]));
                state.pool = [...generalQuestions];
            }

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderLadder();
            nextQuestion();
        }

        function renderLadder() {
            const cont = document.getElementById('prize-ladder');
            cont.innerHTML = '';
            [...prizeLadder].reverse().forEach(p => {
                const div = document.createElement('div');
                div.className = `p-[6px] px-2 rounded-xl text-[10px] flex justify-between bg-white border border-blue-50 transition-all ${p.lv === state.step+1 ? 'prize-active' : 'text-gray-400'} ${p.t ? 'threshold' : ''}`;
                div.innerHTML = `<span>${p.lv}. ${p.text}</span> ${p.t ? '🚩' : ''}`;
                cont.appendChild(div);

                if(p.lv === state.step+1) {
                    setTimeout(() => div.scrollIntoView({ behavior: "smooth", block: "center" }), 100);
                }
            });
        }

        function nextQuestion() {
            if(state.step >= 20) return end(true);

            if(state.step === 0) {
                const sIdx = getStarterIndex();
                state.currentQ = starterQuestions[sIdx];
            } else {
                if(state.pool.length === 0) return end(false);
                let idx = Math.floor(Math.random() * state.pool.length);
                state.currentQ = state.pool[idx];
                state.pool.splice(idx, 1);
                saveGlobalUsed(state.currentQ.id);
            }

            document.getElementById('q-text').innerText = state.currentQ.q;
            document.getElementById('life-count').innerText = state.lives;
            document.getElementById('q-step-label').innerText = `Асуулт ${state.step + 1}`;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            let opts = state.currentQ.a.map((t, i) => ({ t, c: i === 0 })).sort(() => Math.random() - 0.5);
            
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn bg-white font-bold text-gray-700 shadow-sm text-sm";
                b.innerText = o.t;
                b.onclick = () => check(o.c, b);
                grid.appendChild(b);
            });
            resetTimer();
        }

        function check(isCorrect, btn) {
            clearInterval(state.interval);
            const all = document.querySelectorAll('.option-btn');
            all.forEach(b => b.disabled = true);

            if(isCorrect) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-500');
                state.step++;
                if(prizeLadder[state.step-1].t) state.safePoint = state.step;
                setTimeout(() => { renderLadder(); nextQuestion(); }, 1200);
            } else {
                btn.classList.add('bg-red-500', 'text-white', 'border-red-500');
                all.forEach(b => { if(b.innerText === state.currentQ.a[0]) b.classList.add('bg-green-500', 'text-white'); });
                
                if(state.lives > 0) {
                    state.lives--;
                    document.getElementById('life-count').innerText = state.lives;
                    setTimeout(() => { nextQuestion(); }, 2000);
                } else {
                    setTimeout(() => end(false), 2000);
                }
            }
        }

        function resetTimer() {
            clearInterval(state.interval);
            state.timer = 60;
            const el = document.getElementById('game-timer');
            el.innerText = state.timer;
            state.interval = setInterval(() => {
                state.timer--;
                el.innerText = state.timer;
                if(state.timer <= 0) { clearInterval(state.interval); end(false); }
            }, 1000);
        }

        function use5050() {
            const btns = Array.from(document.querySelectorAll('.option-btn'));
            const correct = state.currentQ.a[0];
            let hidden = 0;
            btns.filter(b => b.innerText !== correct).sort(() => Math.random() - 0.5).forEach(b => {
                if(hidden < 2) { b.style.visibility = 'hidden'; hidden++; }
            });
            document.getElementById('btn-5050').disabled = true; 
            document.getElementById('btn-5050').style.opacity = "0.2";
        }

        function useAsk() {
            state.timer += 30;
            document.getElementById('game-timer').innerText = state.timer;
            document.getElementById('btn-ask').disabled = true; 
            document.getElementById('btn-ask').style.opacity = "0.2";
        }

        function end(win) {
            clearInterval(state.interval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-name').innerText = state.name;
            document.getElementById('final-date').innerText = "Огноо: " + new Date().toLocaleDateString();
            
            const count = win ? 20 : state.safePoint;
            document.getElementById('result-title').innerText = win ? "САЯТАН БОЛЛОО!" : "ТОГЛООМ ДУУСЛАА";
            const list = document.getElementById('won-prizes-list');
            list.innerHTML = count > 0 ? "" : "<p class='col-span-2 text-center text-gray-400 italic'>Эрх хожиж чадсангүй.</p>";
            for(let i=0; i<count; i++) list.innerHTML += `<div class='text-[11px] font-bold'>✅ ${prizeLadder[i].text}</div>`;
            if(win) confetti({ particleCount: 200, spread: 80, origin: { y: 0.7 } });
        }
    </script>
</body>
</html>
